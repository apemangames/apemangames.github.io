<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ed1c24">
    <title>APEMAN UNO</title>
    
    <link rel="icon" type="image/png" href="images/unofavicon.png">
    
    <style>
        :root {
            --bg-color: #ed1c24; 
            --uno-yellow: #f8da28;
            --uno-red: #ff5555;
            --uno-blue: #5555ff;
            --uno-green: #55aa55;
            --font-uno: 'Helvetica', Arial, sans-serif;
        }

        * { box-sizing: border-box; scrollbar-width: none; -ms-overflow-style: none; outline: none; font-weight: bold;}
        *::-webkit-scrollbar { display: none; }

        html, body {
            margin: 0; padding: 0; 
            font-family: var(--font-uno);
            display: flex; flex-direction: column; align-items: center; 
            width: 100%; height: 100%; overflow: hidden;
            background-color: var(--bg-color); /* Fixed white status bar issue */
        }

        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-color); z-index: -1; pointer-events: none;
            background-image: url('images/UNO-background.png');
            background-size: cover; background-position: center;
        }

        /* 100% ACCURATE, SUPER SMOOTH UNO FONT STACK */
        .uno-text {
            color: var(--uno-yellow);
            font-family: var(--font-uno);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
            
            /* 1. Thin white inner stroke wrapping the yellow */
            -webkit-text-stroke: 1.5px white; 
            
            /* 2. Smooth Black border + Heavy Bottom-Left Bulging Shadow */
            text-shadow: 
                -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000,
                0px 2px 0 #000, 0px -2px 0 #000, 2px 0px 0 #000, -2px 0px 0 #000,
                -2px 2px 0 #000, -3px 3px 0 #000, -4px 4px 0 #000, -5px 5px 0 #000, -6px 6px 0 #000,
                -3px 2px 0 #000, -4px 3px 0 #000, -5px 4px 0 #000, -6px 5px 0 #000,
                -2px 3px 0 #000, -3px 4px 0 #000, -4px 5px 0 #000, -5px 6px 0 #000;
                
            /* 3. Outer white perimeter trace wrapping the whole shape */
            filter: 
                drop-shadow(1.5px 0px 0px #fff) 
                drop-shadow(-1.5px 0px 0px #fff) 
                drop-shadow(0px 1.5px 0px #fff) 
                drop-shadow(0px -1.5px 0px #fff);
        }

        .uno-text-simple {
            color: var(--uno-yellow);
            font-family: var(--font-uno);
            font-weight: 900;
            text-transform: uppercase;
            text-shadow: -2px 2px 0 #000;
            letter-spacing: 1px;
        }

        .view-wrapper { position: relative; width: 100%; display: flex; justify-content: center; flex: 1; overflow: hidden; }
        
        .view-section, .host-fullscreen-view { 
            position: absolute; top:0; left:0; width: 100%; height: 100%; 
            padding: 0; padding-bottom: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            opacity: 0; visibility: hidden; pointer-events: none; transform: scale(1.05); transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s; 
            overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch;
        }
        
        .host-fullscreen-view { overflow: hidden; padding-top: env(safe-area-inset-top); }
        .view-section.active, .host-fullscreen-view.active { opacity: 1; visibility: visible; pointer-events: auto; transform: scale(1); }

        /* Added dynamic iOS safe-area padding */
        .player-only-view { 
            padding: calc(20px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom)) 20px;
        }

        /* UI ELEMENTS */
        .btn-primary { 
            background: var(--uno-yellow); border: 4px solid black; color: black; 
            font-family: var(--font-uno); font-size: 30px; font-weight: 900;
            padding: 15px 40px; border-radius: 30px; cursor: pointer; box-shadow: -4px 6px 0px black; 
            transition: transform 0.1s, box-shadow 0.1s; text-transform: uppercase;
        }
        .btn-primary:active { transform: translate(-2px, 4px); box-shadow: -2px 2px 0px black; }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: translate(-2px, 4px); box-shadow: -2px 2px 0px black;}

        /* MUTE BUTTONS */
        .btn-mute { background: rgba(0,0,0,0.8); border: 2px solid var(--uno-yellow); border-radius: 50%; width: 55px; height: 55px; cursor: pointer; display: flex; justify-content: center; align-items: center; padding: 0; flex-shrink: 0; transition: transform 0.2s;}
        .btn-mute svg { width: 28px; height: 28px; fill: var(--uno-yellow); }
        .btn-mute:hover { transform: scale(1.05); }

        .pill-input { width: 100%; background: rgba(0,0,0,0.6); border: 3px solid var(--uno-yellow); color: white; font-family: var(--font-uno); font-size: 35px; text-align: center; padding: 15px; border-radius: 15px; box-shadow: 0px 6px 0px black; margin-bottom: 10px; outline: none; transition: transform 0.1s; text-transform: uppercase; font-weight: bold; letter-spacing: 2px;}
        .pill-input::placeholder { color: rgba(255, 255, 255, 0.4); }
        .pill-input:focus { transform: translateY(2px); box-shadow: 0px 4px 0px black; }

        /* HOST LOBBY & HEADER (Standardized) */
        .lobby-top-bar { 
            display: flex; justify-content: space-between; align-items: center; 
            width: 90%; margin-top: 40px; margin-bottom: 40px; padding: 0; position: relative; flex-shrink: 0;
        }
        .lobby-logo { font-size: 100px; text-align: left; line-height: 0.8; margin: 0; }
        .lobby-top-center { 
            position: absolute; left: 50%; transform: translateX(-50%); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; width: max-content;
        }
        .lobby-center-text { font-family: var(--font-uno); font-size: 36px; color: white; margin: 0; font-weight: 900; text-align: center; text-transform: uppercase; text-shadow: -2px 2px 0px #000; letter-spacing: 1px;}
        
        .lobby-code-wrapper { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .code-row { display: flex; align-items: center; gap: 20px; }
        .lobby-code-box { font-size: 100px; line-height: 0.8; margin: 0; text-transform: uppercase;}
        .lobby-url { font-family: sans-serif; font-weight: bold; font-size: 22px; color: white; text-shadow: -2px 2px 0px #000; margin: 0; width: 100%; text-align: right;}
        
        /* PLAYER LIST */
        .player-list { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; width: 100%; max-width: 1000px;}
        .player-pill { background: rgba(0,0,0,0.8); border: 3px solid var(--uno-yellow); color: white; font-size: 30px; padding: 10px 25px; border-radius: 40px; box-shadow: -4px 4px 0 black; text-transform: uppercase;}
        
        /* HOST PLAYING LAYOUT */
        .host-playing-layout { display: flex; flex-direction: column; align-items: center; width: 100%; flex: 1; justify-content: center;}
        
        .card-pile-container { position: relative; height: 350px; display: flex; justify-content: center; align-items: center;}
        
        /* STRICT ASPECT RATIO & ROUNDING */
        .card-img { 
            height: 100%; aspect-ratio: 682 / 1052; object-fit: contain; border-radius: 15px;
            filter: drop-shadow(-8px 10px 15px rgba(0,0,0,0.6)); 
        }
        
        /* Bottom Anchored Host Hand Fan (Peeking Out) */
        .host-player-tracker { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            display: flex; justify-content: space-around; align-items: flex-end; 
            padding: 0 40px; pointer-events: none;
        }
        .tracker-card { 
            display: flex; flex-direction: column; align-items: center; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateY(60px); /* Push down so it peeks out the bottom */
        }
        .tracker-card.active-turn { 
            transform: scale(1.15) translateY(20px); /* Pulls up slightly when it's their turn */
        }
        .tracker-name { 
            color: white; font-size: 32px; margin-bottom: 10px; z-index: 20; 
            text-shadow: -2px 2px 0 #000; font-family: var(--font-uno); font-weight: 900; text-transform: uppercase;
        }
        .tracker-cards-visual { 
            display: flex; justify-content: center; height: 140px; 
            filter: drop-shadow(-4px 4px 10px rgba(0,0,0,0.8));
        }
        .mini-tracker-card { 
            height: 100%; aspect-ratio: 682 / 1052; object-fit: contain; border-radius: 8px; 
            box-shadow: -2px 2px 4px rgba(0,0,0,0.6); position: relative;
        }

        /* PLAYER MOBILE UI */
        #view-player-playing { justify-content: space-between; }
        .player-top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 30px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 15px; border: 2px solid var(--uno-yellow);}
        .status-msg { font-size: 26px; color: white; text-transform: uppercase;}
        .top-card-mini { height: 100px; aspect-ratio: 682 / 1052; object-fit: contain; border-radius: 6px; filter: drop-shadow(-2px 4px 4px rgba(0,0,0,0.5));}

        /* UNO & CATCH BUTTONS */
        .player-middle-section { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; width: 100%; gap: 25px; max-width: 400px;}
        .action-row { display: flex; gap: 15px; width: 100%; }
        .btn-uno { flex: 1; background: var(--uno-yellow); font-size: 24px; padding: 15px; border: 3px solid black; border-radius: 15px; box-shadow: -3px 4px 0 black; color: black; text-transform: uppercase;}
        .btn-catch { flex: 1; background: var(--uno-red); color: white; font-size: 24px; padding: 15px; border: 3px solid black; border-radius: 15px; box-shadow: -3px 4px 0 black; text-transform: uppercase;}

        /* BIG, BOTTOM-ANCHORED PHYSICS HAND */
        .bottom-hand-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; margin-top: auto; padding-bottom: 10px; }
        .hand-container { 
            display: flex; flex-wrap: wrap; justify-content: center; width: 100%; max-width: none; 
            padding: 20px 10px; 
        }
        .hand-card { 
            height: clamp(160px, 25vh, 220px); aspect-ratio: 682 / 1052; border-radius: 12px;
            margin: -10px -20px 0 -20px; /* Strong overlap for a tight fan */
            cursor: pointer; position: relative; z-index: 1;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), filter 0.3s ease; 
            filter: drop-shadow(-4px 4px 5px rgba(0,0,0,0.5));
        }
        .hand-card:hover { 
            transform: translateY(-25px) scale(1.15); 
            z-index: 10; 
            filter: drop-shadow(-8px 8px 10px rgba(0,0,0,0.7));
        }
        /* Invalid cards retain color but cannot be clicked/hovered */
        .hand-card.invalid { cursor: not-allowed; }
        .hand-card.invalid:hover { transform: none; z-index: 1; filter: drop-shadow(-4px 4px 5px rgba(0,0,0,0.5)); }

        /* OVERLAYS */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 500; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: opacity 0.3s; padding: 20px;}
        .modal-overlay.active { opacity: 1; visibility: visible; pointer-events: auto;}
        
        .color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;}
        .color-btn { width: 120px; height: 120px; border-radius: 20px; border: 6px solid white; cursor: pointer; box-shadow: -5px 5px 0 black; transition: transform 0.1s;}
        .color-btn:active { transform: translate(-2px, 2px); box-shadow: -2px 2px 0 black;}
        .c-red { background-color: var(--uno-red); }
        .c-blue { background-color: var(--uno-blue); }
        .c-green { background-color: var(--uno-green); }
        .c-yellow { background-color: var(--uno-yellow); }

        .catch-list { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; width: 100%; max-width: 400px;}
        .catch-btn { background: #333; color: white; border: 3px solid var(--uno-yellow); padding: 15px; font-size: 24px; border-radius: 15px; cursor: pointer; text-transform: uppercase;}

        @media (max-width: 768px) {
            .lobby-top-bar { flex-direction: row; align-items: flex-start; justify-content: space-between; width: 90%; margin-top: 20px; margin-bottom: 20px;}
            .lobby-logo { font-size: 60px; }
            .lobby-code-wrapper { align-items: flex-end; }
            .lobby-code-box { font-size: 60px; }
            .lobby-url { font-size: 14px; }
            .lobby-top-center { display: none; } 
            
            .hand-card { height: clamp(140px, 20vh, 180px); margin: -10px -15px 0 -15px;}
        }
    </style>
</head>
<body>

    <div class="view-wrapper">
        
        <section id="view-player-waiting" class="view-section player-only-view">
            <div class="uno-text" style="font-size: 100px; margin-bottom: 20px;">UNO</div>

            <h2 class="uno-text-simple" style="font-size: 40px; color: white; -webkit-text-stroke:0; text-shadow:none; filter:none; letter-spacing: 2px; text-align: center;">YOU WON,<br>CONGRATS!</h2>

            </div>

            <div class="bottom-hand-wrapper">
                <div class="uno-text-simple" style="font-size: 30px; margin-top: 20px; margin-bottom: 10px;">YOUR HAND</div>
                <div class="hand-container" id="player-hand-container">
                    </div>
            </div>
            
        </section>

    </div>

    <div id="view-lobby" class="host-fullscreen-view">
        <div class="lobby-top-bar">
            <div class="uno-text lobby-logo">UNO</div>
            <div class="lobby-top-center">
                <div class="lobby-center-text" id="lobby-waiting-text">WAITING FOR PLAYERS...</div>

        <div class="player-list" id="lobby-player-list" style="margin-top: 60px;">

        <div class="lobby-top-bar" style="margin-top: 20px; margin-bottom: 10px;">
            <div class="uno-text lobby-logo" style="font-size: 80px;">UNO</div>
            <div class="lobby-code-wrapper">
                <div class="code-row">
                    <button class="btn-mute btn-mute-toggle" title="Toggle Music">
                        <svg class="icon-sound-on" width="24" height="24" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>

            </div>
        <button class="btn-primary" style="margin-top:30px; background: white;" onclick="document.getElementById('catch-uno-overlay').classList.remove('active')">CANCEL</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, get, child, onValue, push, update, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {

            authDomain: "apeman-games.firebaseapp.com",
            projectId: "apeman-games",
            storageBucket: "apeman-games.firebasestorage.app",
            messagingSenderId: "302972768378",
            appId: "1:302972768378:web:84a81fc4cbaff66a012bc3",
            databaseURL: "https://apeman-games-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let prevDeckLength = -1;
        
        const PLACES = ["1ST", "2ND", "3RD", "4TH", "5TH", "6TH", "7TH", "8TH", "9TH", "10TH"];

        // ==========================================
        // DECK ENGINE
        // ==========================================
        function createDeck() {
            let deck = [];
            let idCounter = 0;
            const colors = ['red', 'blue', 'green', 'yellow'];
            const actionTypes = ['skip', 'reverse', 'plus2'];

            colors.forEach(c => {
                deck.push({ id: idCounter++, color: c, value: '0', img: `${c}-0.png` });
                for (let i = 1; i <= 9; i++) {
                    deck.push({ id: idCounter++, color: c, value: i.toString(), img: `${c}-${i}.png` });
                    deck.push({ id: idCounter++, color: c, value: i.toString(), img: `${c}-${i}.png` });
                }
                actionTypes.forEach(act => {
                    deck.push({ id: idCounter++, color: c, value: act, img: `${c}-${act}.png` });
                    deck.push({ id: idCounter++, color: c, value: act, img: `${c}-${act}.png` });
                });
            });

            for(let i=0; i<4; i++) {
                deck.push({ id: idCounter++, color: 'wild', value: '4colors', img: '4colors.png' });
                deck.push({ id: idCounter++, color: 'wild', value: 'plus4', img: 'plus4.png' });
            }

            return shuffle(deck);
        }

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex > 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        // ==========================================
        // HOST ANIMATION LOGIC (Wooshes ONLY here)
        // ==========================================
        function triggerDrawAnimation() {
            playAudio(sfxWoosh);
            const wrapper = document.getElementById('draw-pile-wrapper');
            const drawPile = document.getElementById('host-draw-pile');
            const clone = drawPile.cloneNode(true);
            
            clone.style.position = 'absolute';
            clone.style.zIndex = '100';
            clone.style.transition = 'transform 0.4s ease-in, opacity 0.4s ease-in';
            wrapper.appendChild(clone);
            
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    clone.style.transform = 'translateY(800px) scale(0.5)';
                    clone.style.opacity = '0';
                });
            });
            setTimeout(() => clone.remove(), 400);
        }

        function triggerPlayAnimation(imgUrl) {
            playAudio(sfxWoosh);
            const wrapper = document.getElementById('discard-pile-wrapper');
            const discardPile = document.getElementById('host-top-card');
            const animCard = document.createElement('img');
            
            animCard.src = `UNO Cards/${imgUrl}`;
            animCard.className = 'card-img';
            animCard.style.position = 'absolute';
            animCard.style.top = '0'; animCard.style.left = '0';
            animCard.style.transform = 'translateY(800px) scale(1.5)';

            wrapper.appendChild(animCard);

                    animCard.style.transform = 'translateY(0) scale(1)';

        // ==========================================
        // HOST LOGIC
        // ==========================================
        function hideAllHostViews() { 
            document.querySelectorAll('.host-fullscreen-view').forEach(el => el.classList.remove('active')); 
        }

        function initHost() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'; let code = '';
            for (let i = 0; i < 4; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
            myRoomCode = code; 

            set(ref(db, 'rooms/' + code), { 
                game: 'uno', 
                status: 'waiting', 
                players: {} 
            }).then(() => {
                document.querySelectorAll('.lobby-code-box').forEach(el => el.innerText = code);

                onValue(ref(db, 'rooms/' + code), (snap) => {
                    const room = snap.val();
                    if(!room) return;
                    globalRoomData = room;

                    const players = room.players || {};
                    const onlinePlayerIds = Object.keys(players).filter(id => players[id].status === 'online');

                    if (room.status === 'waiting') {
                        const lobbyList = document.getElementById('lobby-player-list');
                        lobbyList.innerHTML = '';
                        onlinePlayerIds.forEach(pId => {
                            lobbyList.innerHTML += `<div class="player-pill">${players[pId].name.toUpperCase()}</div>`;
                        });

                        const startBtn = document.getElementById('btn-host-start');
                        const textDiv = document.getElementById('lobby-waiting-text');
                        
                        if (onlinePlayerIds.length === 0) { 
                            textDiv.innerText = "WAITING FOR PLAYERS..."; 
                            startBtn.style.display = 'none'; 
                            textDiv.style.display = 'block'; 
                        }
                        else if (onlinePlayerIds.length < 2) { 
                            textDiv.innerText = `${2 - onlinePlayerIds.length} MORE NEEDED...`; 
                            startBtn.style.display = 'none'; 
                            textDiv.style.display = 'block'; 
                        } 
                        else { 
                            textDiv.style.display = 'none'; 
                            startBtn.style.display = 'inline-block'; 
                        }
                    } 
                    else if (room.status === 'playing' && room.gameState) {
                        const state = room.gameState;
                        const topCard = state.discardPile[state.discardPile.length - 1];
                        const currentDeckLength = state.deck ? state.deck.length : 0;

                        // Check for UNO Call Visual
                        if (state.lastUnoCall && state.lastUnoCall.time !== window.lastUnoTime) {
                            window.lastUnoTime = state.lastUnoCall.time;
                            const notif = document.getElementById('host-notification-overlay');
                            document.getElementById('host-notification-msg').innerText = `${state.lastUnoCall.name.toUpperCase()} CALLED UNO!`;
                            notif.classList.add('active');
                            setTimeout(() => notif.classList.remove('active'), 3000);
                        }

                        // Victim Caught Visual
                        if (state.lastCaught && state.lastCaught.time !== window.lastCaughtTime) {
                            window.lastCaughtTime = state.lastCaught.time;
                            const victimName = players[state.lastCaught.targetId].name.toUpperCase();
                            const notif = document.getElementById('host-notification-overlay');
                            document.getElementById('host-notification-msg').innerText = `${victimName} WAS CAUGHT!`;
                            notif.classList.add('active');
                            setTimeout(() => notif.classList.remove('active'), 3000);
                        }

                        if (prevTopCardId !== -1 && prevTopCardId !== topCard.id) {
                            triggerPlayAnimation(topCard.img);
                        } else {
                            document.getElementById('host-top-card').src = `UNO Cards/${topCard.img}`;
                        }

                        if (prevDeckLength !== -1 && currentDeckLength < prevDeckLength) {
                            const drawnCount = prevDeckLength - currentDeckLength;
                            for (let i = 0; i < Math.min(drawnCount, 4); i++) { 
                                setTimeout(triggerDrawAnimation, i * 200);
                            }
                        }

                        prevTopCardId = topCard.id;
                        prevDeckLength = currentDeckLength;

                        // Bottom Anchored Tracker Rendering
                        const trackerContainer = document.getElementById('host-player-tracker');
                        trackerContainer.innerHTML = '';
                        
                        state.turnOrder.forEach((pId, index) => {
                            const p = players[pId];
                            const handCount = state.hands[pId] ? state.hands[pId].length : 0;
                            const isActive = index === state.turnIndex;
                            
                            let cardsHtml = `<div class="tracker-cards-visual">`;
                            for(let i=0; i<handCount; i++) {
                                cardsHtml += `<img src="UNO Cards/uno.png" class="mini-tracker-card" style="margin-left: ${i===0?0:-40}px; z-index: ${i};">`;
                            }
                            cardsHtml += `</div>`;

                            trackerContainer.innerHTML += `
                                <div class="tracker-card ${isActive ? 'active-turn' : ''}">
                                    <div class="tracker-name">${p.name.toUpperCase()}</div>
                                    ${cardsHtml}
                                </div>
                            `;
                        });
                    }
                    else if ((room.status === 'game_over_interim' || room.status === 'game_over') && room.gameState) {
                        const state = room.gameState;
                        const winners = state.winners || [];
                        const lastWinnerId = state.lastWinner;
                        const winnerName = players[lastWinnerId].name.toUpperCase();
                        
                        const placeIndex = winners.length - 1;
                        const placeString = PLACES[placeIndex] || `${winners.length}TH`;

                        document.getElementById('winner-display').innerText = `${winnerName} GETS ${placeString} PLACE!`;

                        if (room.status === 'game_over_interim') {
                            const nextPlaceString = PLACES[winners.length] || "NEXT";
                            document.getElementById('btn-play-interim').innerText = `PLAY FOR ${nextPlaceString} PLACE`;
                            document.getElementById('btn-play-interim').style.display = 'inline-block';
                            document.getElementById('btn-play-again').style.display = 'none'; // Hide reset button during interim
                        } else {
                            document.getElementById('winner-display').innerText = `${winnerName} WINS! (MATCH OVER)`;
                            document.getElementById('btn-play-interim').style.display = 'none';
                            document.getElementById('btn-play-again').style.display = 'inline-block';
                        }

                        hideAllHostViews(); document.getElementById('view-host-game-over').classList.add('active');
                    }
                });
            });
        }

        document.getElementById('btn-host-start').addEventListener('click', () => {
            playAudio(sfxClick);
            const players = globalRoomData.players || {};
            const onlinePlayerIds = Object.keys(players).filter(id => players[id].status === 'online');
            
            let deck = createDeck();
            let hands = {};
            
            onlinePlayerIds.forEach(pId => {
                hands[pId] = [];
                for(let i=0; i<7; i++) { hands[pId].push(deck.pop()); }
            });

            let topCardIndex = deck.findIndex(c => c.color !== 'wild' && !['skip','reverse','plus2'].includes(c.value));
            if(topCardIndex === -1) topCardIndex = 0; 
            
            const firstCard = deck.splice(topCardIndex, 1)[0];
            
            const initialState = {
                deck: deck,
                discardPile: [firstCard],
                hands: hands,
                turnOrder: shuffle([...onlinePlayerIds]),
                turnIndex: 0,
                turnCount: 0,
                direction: 1,
                currentColor: firstCard.color,
                pendingDraw: 0,
                hasDrawn: false,
                calledUno: {},
                reachedOneCardTurn: {},
                winners: []
            };

            update(ref(db, `rooms/${myRoomCode}`), { status: 'playing', gameState: initialState }).then(() => {
                hideAllHostViews(); document.getElementById('view-host-playing').classList.add('active');
            });
        });

        // Interim "Play for X Place" Button
        document.getElementById('btn-play-interim').addEventListener('click', () => {
            playAudio(sfxClick);
            const state = globalRoomData.gameState;
            
            // Remove the winner from the turn order
            let newTurnOrder = state.turnOrder.filter(id => id !== state.lastWinner);
            
            // Find the proposed next player's new index
            let nextIdx = newTurnOrder.indexOf(state.nextPlayerId);
            if (nextIdx === -1) nextIdx = 0; // Failsafe

            update(ref(db, `rooms/${myRoomCode}`), { 
                status: 'playing',
                'gameState/turnOrder': newTurnOrder,
                'gameState/turnIndex': nextIdx
            }).then(() => {
                hideAllHostViews(); document.getElementById('view-host-playing').classList.add('active');
            });
        });

        document.getElementById('btn-play-again').addEventListener('click', () => {

                hideAllHostViews(); document.getElementById('view-lobby').classList.add('active');
            });

        // ==========================================
        // PLAYER LOGIC
        // ==========================================
        function hideAllPlayerViews() {
            window.scrollTo({top: 0, behavior: 'instant'});
            document.querySelectorAll('.player-only-view').forEach(el => el.classList.remove('active'));
        }

        function proceedToGame(codeInput) {
            onValue(ref(db, `rooms/${codeInput}`), (snap) => {
                const room = snap.val(); if(!room) return;
                globalRoomData = room;
                
                // Unlock actions whenever the database syncs a new turn state
                isActionLocked = false; 

                const players = room.players || {};
                if (!players[myPlayerId]) { 
                    sessionStorage.clear(); window.location.href='index.html'; return; 
                }

                if (room.status === 'waiting') {
                    hideAllPlayerViews(); document.getElementById('view-player-waiting').classList.add('active');
                    document.getElementById('player-waiting-sub').innerText = "WAITING FOR HOST TO DEAL THE CARDS...";
                } 
                else if (room.status === 'playing' && room.gameState) {
                    const state = room.gameState;

                    // If this specific player has already won, leave them on the "You Won" screen
                    if (state.winners && state.winners.includes(myPlayerId)) {
                        hideAllPlayerViews(); document.getElementById('view-player-won').classList.add('active');
                        return;
                    }

                    hideAllPlayerViews(); document.getElementById('view-player-playing').classList.add('active');
                    
                    const topCard = state.discardPile[state.discardPile.length - 1];
                    const myTurnIndex = state.turnOrder.indexOf(myPlayerId);
                    const isMyTurn = state.turnIndex === myTurnIndex;
                    const pendingDrawAmount = state.pendingDraw || 0;
                    const hasDrawn = state.hasDrawn || false;

                    // Victim Notification checking
                    if (state.lastCaught && state.lastCaught.targetId === myPlayerId) {
                        if (state.lastCaught.time !== window.lastCaughtTime) {
                            window.lastCaughtTime = state.lastCaught.time;
                            showCustomAlert("YOU WERE CAUGHT NOT SAYING UNO!\n\n+4 CARDS");
                        }
                    }

                    document.getElementById('mobile-top-card').src = `UNO Cards/${topCard.img}`;
                    
                    const msgEl = document.getElementById('player-turn-msg');
                    const btnDraw = document.getElementById('btn-draw-card');
                    const handContainer = document.getElementById('player-hand-container');
                    
                    // Core Turn Logic Engine
                    let canPlayFromHand = isMyTurn && pendingDrawAmount === 0;

                    if (isMyTurn) {
                        if (pendingDrawAmount > 0) {
                            msgEl.innerText = "PENALTY!";
                            msgEl.style.color = "var(--uno-red)";
                            btnDraw.innerText = `DRAW ${pendingDrawAmount} CARDS`;
                            btnDraw.style.background = "var(--uno-red)";
                            btnDraw.style.color = "white";
                            btnDraw.disabled = false;
                        } else if (hasDrawn) {
                            msgEl.innerText = "PLAY OR PASS";
                            msgEl.style.color = "var(--uno-yellow)";
                            btnDraw.innerText = "END TURN";
                            btnDraw.style.background = "var(--uno-yellow)";
                            btnDraw.style.color = "black";
                            btnDraw.disabled = false;
                        } else {
                            msgEl.innerText = "YOUR TURN!";
                            msgEl.style.color = "var(--uno-yellow)";
                            btnDraw.innerText = "DRAW CARD";
                            btnDraw.style.background = "white";
                            btnDraw.style.color = "black";
                            btnDraw.disabled = false;
                        }
                    } else {
                        const activePId = state.turnOrder[state.turnIndex];
                        msgEl.innerText = `WAITING FOR ${players[activePId].name.toUpperCase()}...`;
                        msgEl.style.color = "white";
                        btnDraw.innerText = "DRAW CARD";
                        btnDraw.style.background = "white";
                        btnDraw.style.color = "black";
                        btnDraw.disabled = true;
                    }

                    // Render Hand
                    const hand = state.hands[myPlayerId] || [];
                    handContainer.innerHTML = '';

                    hand.forEach((card, index) => {
                        const isColorMatch = card.color === 'wild' || card.color === state.currentColor || card.value === topCard.value;
                        const isValid = canPlayFromHand && isColorMatch;
                        
                        const img = document.createElement('img');
                        img.src = `UNO Cards/${card.img}`;
                        img.className = `hand-card ${isValid ? '' : 'invalid'}`;
                        
                        if (isValid) {
                            img.onclick = () => { 
                                if(isActionLocked) return;
                                playAudio(sfxClick); 
                                handleCardPlay(card, index); 
                            }
                        }
                        handContainer.appendChild(img);
                    });

                } 
                else if (room.status === 'game_over_interim' && room.gameState) {
                    if (room.gameState.winners && room.gameState.winners.includes(myPlayerId)) {
                        hideAllPlayerViews(); document.getElementById('view-player-won').classList.add('active');
                    } else {
                        hideAllPlayerViews(); document.getElementById('view-player-waiting').classList.add('active');
                        document.getElementById('player-waiting-sub').innerText = "WAITING FOR NEXT ROUND TO START...";
                    }
                }
                else if (room.status === 'game_over') {
                    hideAllPlayerViews(); document.getElementById('view-player-game-over').classList.add('active');
                }
            });
        }

        // --- UNO BUTTONS (Perfected Safe Logic) ---
        document.getElementById('btn-call-uno').addEventListener('click', () => {
            get(child(ref(db), `rooms/${myRoomCode}/gameState`)).then(snap => {
                const state = snap.val();
                if (!state) return;
                const myHand = state.hands[myPlayerId] || [];
                
                if (myHand.length > 1) {
                    showCustomAlert("YOU HAVE MORE THAN ONE CARD LEFT!");
                    return;
                }
                
                playAudio(sfxClick);

                let updates = {};
                updates[`gameState/calledUno/${myPlayerId}`] = true;
                updates['gameState/lastUnoCall'] = { name: myPlayerName, time: Date.now() };

                update(ref(db, `rooms/${myRoomCode}`), updates).then(() => {
                    showCustomAlert("UNO!");
                    const msgEl = document.getElementById('player-turn-msg');
                    msgEl.innerText = "UNO CALLED!";
                    msgEl.style.color = "var(--uno-green)";
                }).catch(e => console.error(e));
            });

        document.getElementById('btn-catch-uno').addEventListener('click', () => {
            playAudio(sfxClick);
            const players = globalRoomData.players;
            const state = globalRoomData.gameState;
            const catchList = document.getElementById('catch-uno-list');
            catchList.innerHTML = '';

            Object.entries(players).forEach(([pId, p]) => {
                // Only show active players who are still in the turn order (haven't won yet)
                if (pId !== myPlayerId && p.status === 'online' && state.turnOrder.includes(pId)) {
                    const btn = document.createElement('button');
                    btn.className = 'catch-btn';
                    btn.innerText = p.name.toUpperCase();
                    btn.onclick = () => catchPlayer(pId);
                    catchList.appendChild(btn);
                }
            });

            document.getElementById('catch-uno-overlay').classList.add('active');
        });

        window.catchPlayer = function(targetId) {
            playAudio(sfxClick);
            document.getElementById('catch-uno-overlay').classList.remove('active');
            get(ref(db, `rooms/${myRoomCode}/gameState`)).then(snap => {
                const state = snap.val();
                const targetHand = state.hands[targetId] || [];
                const hasCalled = state.calledUno && state.calledUno[targetId];
                const safeTurn = (state.reachedOneCardTurn && state.reachedOneCardTurn[targetId]) || 0;

                if (targetHand.length === 1 && !hasCalled) {
                    if (state.turnCount <= safeTurn) {
                        showCustomAlert("THEY STILL HAVE TIME TO CALL IT!");
                    } else {
                        // CAUGHT! Force Draw 4
                        let newDeck = [...state.deck];
                        let newDiscard = [...state.discardPile];
                        let newTargetHand = [...targetHand];
                        
                        for(let i=0; i<4; i++) {
                            if(newDeck.length === 0) recycleDiscard(newDeck, newDiscard);
                            if(newDeck.length > 0) newTargetHand.push(newDeck.pop());
                        }
                        
                        update(ref(db, `rooms/${myRoomCode}`), {
                            'gameState/deck': newDeck,
                            'gameState/discardPile': newDiscard,
                            [`gameState/hands/${targetId}`]: newTargetHand,
                            [`gameState/calledUno/${targetId}`]: false,
                            'gameState/lastCaught': { targetId: targetId, time: Date.now() }
                        });
                        
                        showCustomAlert("CAUGHT 'EM!\n\nTHEY DREW 4 CARDS.");
                    }
                } else {
                    showCustomAlert("THEY ARE SAFE!");
                }
            });
        };

        // --- GAMEPLAY ACTIONS ---
        function handleCardPlay(card, handIndex) {
            if (isActionLocked) return;
            isActionLocked = true; 

            if (card.color === 'wild') {
                pendingWildCardIndex = handIndex;
                document.getElementById('color-picker-overlay').classList.add('active');
                return;
            }
            executePlay(handIndex, card.color);
        }

        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                playAudio(sfxClick);
                const chosenColor = e.target.dataset.color;
                document.getElementById('color-picker-overlay').classList.remove('active');
                if (pendingWildCardIndex !== null) {
                    executePlay(pendingWildCardIndex, chosenColor);
                    pendingWildCardIndex = null;
                } else {
                    isActionLocked = false; 
                }
            });
        });

        function executePlay(handIndex, finalColor) {
            const state = globalRoomData.gameState;
            const myHand = [...state.hands[myPlayerId]];
            let playedCard = myHand.splice(handIndex, 1)[0];
            
            // Dynamic Wild Card Image Assignment
            if (playedCard.color === 'wild') {
                if (playedCard.value === 'plus4') playedCard.img = `${finalColor}-plus4.png`;
                if (playedCard.value === '4colors') playedCard.img = `${finalColor}-4colors.png`;
                playedCard.color = finalColor; 
            }

            let newDeck = [...state.deck];
            let newDiscard = [...state.discardPile, playedCard];
            let newHands = { ...state.hands };
            newHands[myPlayerId] = myHand;

            let nextTurnIndex = state.turnIndex;
            let newDirection = state.direction;
            let numPlayers = state.turnOrder.length;
            let newPendingDraw = 0;
            let nextTurnCount = state.turnCount + 1;

            // Track Grace Period for UNO Call
            let newReachedOne = { ...(state.reachedOneCardTurn || {}) };
            if (myHand.length === 1) {
                newReachedOne[myPlayerId] = nextTurnCount;
            }

            if (playedCard.value === 'reverse') {
                if (numPlayers === 2) {
                    nextTurnIndex = (nextTurnIndex + newDirection + numPlayers) % numPlayers;
                } else {
                    newDirection *= -1;
                }
            } 
            else if (playedCard.value === 'skip') {
                nextTurnIndex = (nextTurnIndex + newDirection + numPlayers) % numPlayers;
            }
            else if (playedCard.value === 'plus2') {
                newPendingDraw = 2; // Flat 2 per standard rules
            }
            else if (playedCard.value === 'plus4') {
                newPendingDraw = 4; // Flat 4 per standard rules
            }

            nextTurnIndex = (nextTurnIndex + newDirection + numPlayers) % numPlayers;
            let nextPlayerId = state.turnOrder[nextTurnIndex];

            let updates = {
                'gameState/deck': newDeck,
                'gameState/discardPile': newDiscard,
                'gameState/hands': newHands,
                'gameState/turnCount': nextTurnCount,
                'gameState/direction': newDirection,
                'gameState/currentColor': finalColor,
                'gameState/pendingDraw': newPendingDraw,
                'gameState/hasDrawn': false,
                'gameState/reachedOneCardTurn': newReachedOne
            };

            // Multi-Tier Winning Logic
            if (myHand.length === 0) {
                let winners = state.winners || [];
                winners.push(myPlayerId);
                updates['gameState/winners'] = winners;
                updates['gameState/lastWinner'] = myPlayerId;
                updates['gameState/nextPlayerId'] = nextPlayerId; // Save who should go next

                // If only 1 player will be left after we remove the winner, the whole match is over
                if (state.turnOrder.length <= 2) {
                    updates['status'] = 'game_over';
                    updates['gameState/winnerId'] = winners[0]; // Overall 1st place
                } else {
                    updates['status'] = 'game_over_interim';
                }
                
                update(ref(db, `rooms/${myRoomCode}`), updates);
                return;
            }

            updates['gameState/turnIndex'] = nextTurnIndex;
            update(ref(db, `rooms/${myRoomCode}`), updates);
        }

        // --- DRAW / END TURN BUTTON (Official Rules Logic) ---
        document.getElementById('btn-draw-card').addEventListener('click', function() {
            if (this.disabled || isActionLocked) return;
            isActionLocked = true; 
            this.disabled = true;
            playAudio(sfxClick);

            const state = globalRoomData.gameState;
            let newDeck = [...state.deck];
            let newDiscard = [...state.discardPile];
            let myHand = [...state.hands[myPlayerId]];
            const topCard = newDiscard[newDiscard.length - 1];

            const pendingDraw = state.pendingDraw || 0;
            let nextTurnCount = state.turnCount + 1;

            // SCENARIO 1: Forced Penalty Draw (+2 or +4)
            if (pendingDraw > 0) {
                for(let i=0; i < pendingDraw; i++) {
                    if(newDeck.length === 0) recycleDiscard(newDeck, newDiscard);
                    if(newDeck.length > 0) myHand.push(newDeck.pop());
                }

                update(ref(db, `rooms/${myRoomCode}`), {
                    'gameState/deck': newDeck,
                    'gameState/discardPile': newDiscard,
                    [`gameState/hands/${myPlayerId}`]: myHand,
                    'gameState/pendingDraw': 0,
                    'gameState/hasDrawn': true, // Let them play a card now!
                    [`gameState/calledUno/${myPlayerId}`]: false 
                }).then(() => { isActionLocked = false; });
                return;
            }

            // SCENARIO 2: Player has already drawn and decides to pass (End Turn)
            if (state.hasDrawn) {
                let nextTurnIndex = (state.turnIndex + state.direction + state.turnOrder.length) % state.turnOrder.length;
                update(ref(db, `rooms/${myRoomCode}`), {
                    'gameState/turnIndex': nextTurnIndex,
                    'gameState/turnCount': nextTurnCount,
                    'gameState/hasDrawn': false
                });
                return;
            }

            // SCENARIO 3: Player draws one card voluntarily on their turn
            if(newDeck.length === 0) recycleDiscard(newDeck, newDiscard);
            if(newDeck.length > 0) {
                myHand.push(newDeck.pop());
            }

            const hasPlayable = myHand.some(c => c.color === 'wild' || c.color === state.currentColor || c.value === topCard.value);

            if (hasPlayable) {
                update(ref(db, `rooms/${myRoomCode}`), {
                    'gameState/deck': newDeck,
                    'gameState/discardPile': newDiscard,
                    [`gameState/hands/${myPlayerId}`]: myHand,
                    'gameState/hasDrawn': true, // Change button to End Turn
                    [`gameState/calledUno/${myPlayerId}`]: false 
                });
            } else {
                let nextTurnIndex = (state.turnIndex + state.direction + state.turnOrder.length) % state.turnOrder.length;
                update(ref(db, `rooms/${myRoomCode}`), {
                    'gameState/deck': newDeck,
                    'gameState/discardPile': newDiscard,
                    [`gameState/hands/${myPlayerId}`]: myHand,
                    'gameState/turnIndex': nextTurnIndex,
                    'gameState/turnCount': nextTurnCount,
                    'gameState/hasDrawn': false,
                    [`gameState/calledUno/${myPlayerId}`]: false 
                });
            }
        });

        function recycleDiscard(deckArr, discardArr) {
            if (discardArr.length > 1) {
                const topCard = discardArr.pop(); 
                deckArr.push(...shuffle(discardArr)); 
                discardArr.length = 0; 
                discardArr.push(topCard); 
            }
        }

        // ==========================================
        // INIT ROUTING
        // ==========================================
        if (window.isHostMode) {
            initHost();
        } else {
            const savedCode = sessionStorage.getItem('apeman_room');
            const savedName = sessionStorage.getItem('apeman_name');
            
            if (savedCode && savedName) {
                get(child(ref(db), `rooms/${savedCode}`)).then((roomSnap) => {
                    if (!roomSnap.exists()) { alert("Room no longer exists!"); sessionStorage.clear(); window.location.href='index.html'; return; }

                    const players = roomSnap.val().players || {};
                    let existingPlayerId = null; let canJoin = true;

                    for (const [pId, p] of Object.entries(players)) {
                        if (p.name.toUpperCase() === savedName.toUpperCase()) {
                            if (p.status === 'online') { canJoin = false; break; } 
                            else { existingPlayerId = pId; break; }
                        }
                    }

                    if (!canJoin) { alert("Name already active!"); sessionStorage.clear(); window.location.href='index.html'; return; }

                    myRoomCode = savedCode;
                    myPlayerName = savedName.toUpperCase();

                    if (existingPlayerId) {
                        myPlayerId = existingPlayerId;
                        const myStatusRef = ref(db, `rooms/${savedCode}/players/${myPlayerId}/status`);
                        onDisconnect(myStatusRef).set('offline').then(() => {
                            update(ref(db, `rooms/${savedCode}/players/${myPlayerId}`), { status: 'online' }).then(() => { proceedToGame(savedCode); });
                        });
                    } else {
                        const newPlayerRef = push(ref(db, `rooms/${savedCode}/players`));
                        myPlayerId = newPlayerRef.key;
                        const myStatusRef = ref(db, `rooms/${savedCode}/players/${myPlayerId}/status`);
                        onDisconnect(myStatusRef).set('offline').then(() => {
                            set(newPlayerRef, { name: myPlayerName, status: 'online' }).then(() => { proceedToGame(savedCode); });
                        });
                    }
                }).catch((error) => { console.error(error); alert("Connection Error"); window.location.href='index.html'; });
            } else {
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
